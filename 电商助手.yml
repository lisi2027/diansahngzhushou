            value: "SELECT \n    CASE \n        WHEN platfromType IN ('APP', 'AP P')\
              \ OR platfromType LIKE 'APP%' OR platfromType LIKE 'AP %' THEN 'APP'\n\
              \        WHEN platfromType IN ('WeChatMP', 'Wech atMP', 'We c hatMP',\
              \ 'Wech atShop', 'We c hatShop') OR platfromType LIKE 'We%' THEN 'WeChatMP'\n\
              \        WHEN platfromType IN ('WEB', 'WE B') OR platfromType LIKE 'WE%'\
              \ OR platfromType LIKE 'WEB%' THEN 'WEB'\n        WHEN platfromType\
              \ IN ('AlipayMP', 'ALiM P', 'AL i MP') OR platfromType LIKE 'AL%' THEN\
              \ 'AlipayMP'\n        WHEN platfromType = 'Wap' THEN 'Wap'\n       \
              \ ELSE platfromType\n    END AS platform_clean,\n    COUNT(*) AS orders\n\
              FROM orders\nWHERE YEAR(orderTime) = 2019\nGROUP BY platform_clean\n\
              ORDER BY orders DESC"
