          priority\">\U0001F4C5 月度营销日历</div>\n                        <div class=\"\
          detail\">1月元旦促销 → 2月春节清仓 → 3月春上新 → 6月年中大促 → 9月秋上新 → 11月双11 → 12月双12+年终</div>\n\
          \                    </div>\n                    <div class=\"strategy-card\"\
          >\n                        <div class=\"priority\">\U0001F4B0 预算分配建议</div>\n\
          \                        <div class=\"detail\">11月分配全年20%营销预算，12月15%，6月15%；淡季月份（1-2月）分配5%维持基础曝光</div>\n\
          \                    </div>\n                    <div class=\"strategy-card\"\
          >\n                        <div class=\"priority\">\U0001F4E6 库存规划</div>\n\
          \                        <div class=\"detail\">旺季前2个月开始备货，提前锁定供应商产能；淡季进行库存清理和品类优化</div>\n\
          \                    </div>\n                </div>\n            </div>\n\
          \        </div>\n\n        <!-- ==================== 四、星期与平台分析 ====================\
          \ -->\n        <div class=\"section\">\n            <h2>四、星期与平台分析</h2>\n\
          \            <div class=\"chart-row\">\n                <div class=\"chart-card\"\
          >\n                    <h4>\U0001F4E1 图表5：星期订单分布（雷达图）</h4>\n           \
          \         <div id=\"weekdayRadarChart\" class=\"chart-container\"></div>\n\
          \                    <div class=\"chart-description\"><strong>\U0001F4C8\
          \ 图表解读：</strong> 订单在周一达到一周最高点（{peak_weekday_num:,}单），周中保持高位，周末略有下降。</div>\n\
          \                </div>\n                <div class=\"chart-card\">\n  \
