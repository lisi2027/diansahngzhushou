          \                        <div class=\"prediction-reason\">\U0001F4CC 预测依据：2月{low_month_num:,}单（春节影响），1月6434单（元旦后恢复期）</div>\n\
          \                    </div>\n                    <div class=\"prediction-item\"\
          >\n                        <div class=\"prediction-label\">\U0001F4C8 季度趋势</div>\n\
          \                        <div class=\"prediction-value\">Q4 > Q3 > Q2 >\
          \ Q1</div>\n                        <div class=\"prediction-range\">Q4占29.8%，Q1仅16.7%</div>\n\
          \                        <div class=\"prediction-reason\">\U0001F4CC 预测依据：Q4订单{q4_orders:,}单，Q1订单{q1_orders:,}单，Q4比Q1增长{quarter_growth}%</div>\n\
          \                    </div>\n                </div>\n                <div\
          \ class=\"suggestion-box\">\n                    <div class=\"suggestion-title\"\
