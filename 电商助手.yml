          \    </style>\n</head>\n<body>\n<div class=\"container\">\n    <div class=\"\
          header\">\n        <h1>\U0001F4CA 订单趋势与运营策略分析报告</h1>\n        <p>2018年 -\
          \ 2020年 | 基于 {total_all:,} 条订单数据的深度分析与智能预测</p>\n        <p style=\"font-size:12px;\
          \ margin-top:10px;\">报告生成时间：{current_time}</p>\n    </div>\n\n    <div class=\"\
          content\">\n        <!-- ==================== 一、数据概览 ====================\
          \ -->\n        <div class=\"section\">\n            <h2>一、数据概览</h2>\n  \
          \          <div class=\"stats-grid\">\n                <div class=\"stat-card\"\
          ><div class=\"number\">{year_count} 年</div><div class=\"label\">数据年份</div></div>\n\
          \                <div class=\"stat-card\"><div class=\"number\">{total_all:,}</div><div\
          \ class=\"label\">总订单量（单）</div></div>\n                <div class=\"stat-card\"\
          ><div class=\"number\">{amount_2019.get('total', 0):,.0f}</div><div class=\"\
          label\">总营收（元）</div></div>\n                <div class=\"stat-card\"><div\
          \ class=\"number\">{amount_2019.get('avg', 0):.0f}</div><div class=\"label\"\
          >平均订单金额（元）</div></div>\n            </div>\n\n            <h3>各年度订单对比</h3>\n\
          \            <table><thead><tr><th>年份</th><th>订单量</th><th>占比</th><th>数据状态</th></tr></thead>\n\
          \                <tbody>\n                    <tr><td style=\"text-align:center\"\
          >2018</td><td style=\"text-align:center\">{yearly_total.get(2018, 0):,}\
          \ 单</td><td style=\"text-align:center\">{round(yearly_total.get(2018, 0)\
          \ / total_all * 100, 2)}%</td><td style=\"text-align:center\"><span class=\"\
          badge badge-warning\">⚠️ 样本不足</span></td></tr>\n                    <tr\
          \ style=\"background:#e8f4fd;\"><td style=\"text-align:center\"><strong>2019</strong></td><td\
          \ style=\"text-align:center\"><strong>{total_2019:,} 单</strong></td><td\
          \ style=\"text-align:center\"><strong>{round(total_2019 / total_all * 100,\
          \ 2)}%</strong></td><td style=\"text-align:center\"><span class=\"badge\
          \ badge-success\">✅ 核心数据</span></td></tr>\n                    <tr><td style=\"\
          text-align:center\">2020</td><td style=\"text-align:center\">{yearly_total.get(2020,\
          \ 0):,} 单</td><td style=\"text-align:center\">{round(yearly_total.get(2020,\
          \ 0) / total_all * 100, 2)}%</td><td style=\"text-align:center\"><span class=\"\
          badge badge-warning\">⚠️ 样本不足</span></td></tr>\n                </tbody>\n\
          \            </table>\n            <div class=\"insight-box\"><strong>\U0001F4CC\
          \ 数据质量说明：</strong><br>2018年仅5单，2019年{total_2019:,}单全年完整数据，2020年仅256单。核心分析基于2019年数据。</div>\n\
          \n            <!-- 核心结论 -->\n            <div class=\"insight-box\" style=\"\
          border-left-color:#28a745; background:#d4edda;\">\n                <strong>\U0001F3AF\
          \ 核心发现：</strong><br>\n                \U0001F4C8 2019年全年订单量 {total_2019:,}\
          \ 单，日均 {round(total_2019/366, 0)} 单<br>\n                \U0001F4B0 总营收\
          \ {amount_2019.get('total', 0):,.2f} 元，平均客单价 {avg_price:.2f} 元<br>\n   \
          \             ⏰ 订单高峰集中在 13:00 ({peak_num:,}单)，低谷在 {low_hour}:00 ({low_num}单)<br>\n\
          \                \U0001F4C5 旺季月份：{peak_month_name} ({peak_month_num:,}单)，淡季月份：{low_month_name}\
          \ ({low_month_num:,}单)\n            </div>\n        </div>\n\n        <!--\
          \ ==================== 二、时段分布分析 ==================== -->\n        <div class=\"\
          section\">\n            <h2>二、时段分布分析</h2>\n            <div class=\"chart-row\"\
          >\n                <div class=\"chart-card\">\n                    <h4>\U0001F4CA\
