          \                </div>\n            </div>\n            \n            <!--\
          \ 预测1：时段规律预测 -->\n            <div class=\"prediction-box\">\n         \
          \       <div class=\"prediction-title\">⏰ 预测一：时段需求规律预测</div>\n         \
          \       <div class=\"prediction-grid\">\n                    <div class=\"\
          prediction-item\">\n                        <div class=\"prediction-label\"\
          >\U0001F534 预测高峰时段</div>\n                        <div class=\"prediction-value\"\
          >{peak_hour}:00 - {peak_hour+1 if peak_hour+1<24 else 0}:00</div>\n    \
          \                    <div class=\"prediction-range\">预计订单量约{peak_num:,}单/小时</div>\n\
          \                        <div class=\"prediction-reason\">\U0001F4CC 预测依据：2019年全年{peak_hour}点平均{peak_num:,}单，连续366天均为全天最高峰</div>\n\
          \                    </div>\n                    <div class=\"prediction-item\"\
