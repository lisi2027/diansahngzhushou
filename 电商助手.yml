    - data:
        code: "import re\nfrom collections import defaultdict\nfrom datetime import\
          \ datetime\nimport random\n\ndef main(query: str, sql_text: str, sql_goods:\
          \ str, sql_channel: str, sql_platform: str, sql_amount: str, sql_user: str,\
          \ sql_quarter: str) -> dict:\n    q = query.lower()\n    \n    # ====================\
          \ 1. 解析时段数据 ====================\n    lines = sql_text.strip().split('\\\
          n')\n    hour_data = {}\n    month_data = defaultdict(int)\n    weekday_data\
          \ = defaultdict(int)\n    years = set()\n    yearly_total = defaultdict(int)\n\
          \    \n    for line in lines:\n        match = re.findall(r'\\|\\s*(\\d+)\\\
          s*\\|\\s*(\\d+)\\s*\\|\\s*(\\d+)\\s*\\|\\s*(\\d+)\\s*\\|\\s*(\\d+)\\s*\\\
          |', line)\n        if match and len(match[0]) == 5:\n            year =\
          \ int(match[0][0])\n            month = int(match[0][1])\n            weekday\
          \ = int(match[0][2])\n            hour = int(match[0][3])\n            num\
          \ = int(match[0][4])\n            \n            years.add(year)\n      \
          \      yearly_total[year] += num\n            \n            if year == 2019:\n\
          \                hour_data[hour] = hour_data.get(hour, 0) + num\n      \
          \          month_data[month] += num\n                weekday_data[weekday]\
          \ += num\n    \n    # ==================== 2. 解析商品数据 ====================\n\
          \    goods_data = []\n    for line in sql_goods.strip().split('\\n'):\n\
          \        match = re.findall(r'\\|\\s*([A-Z0-9]+)\\s*\\|\\s*(\\d+)\\s*\\\
          |', line)\n        if match:\n            goods_data.append({\"id\": match[0][0],\
          \ \"sales\": int(match[0][1])})\n    \n    # ==================== 3. 解析渠道数据\
          \ ====================\n    channel_data = []\n    for line in sql_channel.strip().split('\\\
          n'):\n        match = re.findall(r'\\|\\s*([^\\s|]+)\\s*\\|\\s*(\\d+)\\\
          s*\\|', line)\n        if match:\n            channel_data.append({\"id\"\
          : match[0][0], \"orders\": int(match[0][1])})\n    \n    # ====================\
          \ 4. 解析平台数据 ====================\n    platform_data = []\n    for line in\
