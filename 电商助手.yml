          \n    \n    elif any(kw in q for kw in [\"分布规律\", \"什么规律\", \"分布特点\", \"\
          趋势\"]) and not any(kw in q for kw in [\"月份\", \"月\"]):\n        answer =\
          \ f\"订单呈双峰分布：午间12-14点（占{pct_12_14}%）和晚间19-21点（占{pct_19_21}%）为两个高峰。\"\n \
          \   \n    elif any(kw in q for kw in [\"13点比4点\", \"多多少单\", \"相差\"]):\n\
          \        answer = f\"13点订单量为{peak_num:,}单，4点订单量为{low_num}单，13点比4点多{diff_num}单。\"\
          \n    \n    # ----- 4. 月份分析 -----\n    elif any(kw in q for kw in [\"哪个月\"\
          , \"月份\", \"几月\"]):\n        if any(kw in q for kw in [\"最多\", \"最高\", \"\
          最大\"]):\n            answer = f\"2019年{peak_month_name}订单最多，共{peak_month_num:,}单，占全年{round(peak_month_num/total_2019*100,\
          \ 1)}%。\"\n        elif any(kw in q for kw in [\"最少\", \"最低\", \"最小\"]):\n\
          \            answer = f\"2019年{low_month_name}订单最少，仅{low_month_num:,}单，占全年{round(low_month_num/total_2019*100,\
          \ 2)}%。\"\n        elif any(kw in q for kw in [\"分布\", \"情况\"]):\n     \
          \       month_dist = \"、\".join([f\"{month_names[m]}{month_data.get(m, 0)}单\"\
          \ for m in range(1, 13)])\n            answer = f\"2019年月份订单分布：{month_dist}。最高为{peak_month_name}（{peak_month_num:,}单），最低为{low_month_name}（{low_month_num:,}单）。\"\
          \n        else:\n            answer = f\"2019年最高峰月份：{peak_month_name}（{peak_month_num:,}单），最低谷月份：{low_month_name}（{low_month_num:,}单）。\"\
          \n    \n    # ----- 5. 季度分析 -----\n    elif any(kw in q for kw in [\"季度\"\
          , \"哪一季度\"]) and \"预测\" not in q:\n        if any(kw in q for kw in [\"\
          最多\", \"最高\", \"最大\"]):\n            answer = f\"Q4（10-12月）订单最多，共{q4_orders:,}单，占全年{round(q4_orders/total_2019*100,\
          \ 1)}%。\"\n        elif any(kw in q for kw in [\"最少\", \"最低\", \"最小\"]):\n\
          \            answer = f\"Q1（1-3月）订单最少，共{q1_orders:,}单，占全年{round(q1_orders/total_2019*100,\
          \ 1)}%。\"\n        else:\n            answer = f\"Q4（10-12月）订单最多（{q4_orders:,}单），Q1（1-3月）订单最少（{q1_orders:,}单）。\"\
          \n    \n    # ----- 6. 商品分析 -----\n    elif any(kw in q for kw in [\"哪个商品\"\
          , \"商品卖得最多\", \"热销商品\", \"销量最高\"]) and \"预测\" not in q:\n        if top_goods:\n\
          \            answer = f\"销量最高的商品是 {top_goods['id']}，共售出 {top_goods['sales']}\
          \ 单。\"\n        else:\n            answer = \"暂无商品数据。\"\n    \n    # -----\
          \ 7. 渠道分析 -----\n    elif any(kw in q for kw in [\"哪个渠道\", \"渠道订单最多\", \"\
          主要渠道\"]):\n        if top_channel:\n            answer = f\"订单最多的渠道是 {top_channel['id']}，共\
          \ {top_channel['orders']:,} 单，占全年{round(top_channel['orders']/total_2019*100,\
          \ 1)}%。\"\n        else:\n            answer = \"暂无渠道数据。\"\n    \n    #\
          \ ----- 8. 平台分析 -----\n    elif any(kw in q for kw in [\"哪个平台\", \"平台订单最多\"\
          , \"主要平台\", \"平台最多\"]) and \"预测\" not in q:\n        if top_platform:\n\
          \            answer = f\"订单最多的平台是 {top_platform['name']}，共 {top_platform['orders']:,}\
          \ 单，占全年{round(top_platform['orders']/total_2019*100, 1)}%。APP和微信小程序合计占比{platform_total_pct}%。\"\
          \n        else:\n            answer = \"暂无平台数据。\"\n    \n    # ----- 9.\
          \ 金额分析 -----\n    elif any(kw in q for kw in [\"平均订单金额\", \"客单价\", \"平均金额\"\
          ]) and \"预测\" not in q and \"涨\" not in q and \"跌\" not in q:\n        answer\
          \ = f\"2019年平均订单金额为 {amount_2019.get('avg', 0):.2f} 元。\"\n    \n    elif\
          \ any(kw in q for kw in [\"总营收\", \"总收入\", \"销售额\"]):\n        answer =\
          \ f\"2019年总营收为 {amount_2019.get('total', 0):,.2f} 元。\"\n    \n    # -----\
          \ 10. 用户分析 -----\n    elif any(kw in q for kw in [\"哪个用户\", \"用户下单最多\",\
          \ \"VIP用户\"]):\n        if top_user:\n            answer = f\"下单最多的用户是 {top_user['id']}，共下单\
          \ {top_user['orders']} 次。\"\n        else:\n            answer = \"暂无用户数据。\"\
          \n    \n    # ----- 11. 运营建议 -----\n    elif any(kw in q for kw in [\"促销\"\
          , \"什么时候做促销\", \"促销建议\"]):\n        answer = \"建议在14-16点和凌晨3-5点设置限时折扣，这两个时段订单较少，促销可以有效拉动销量。\"\
          \n    \n    elif any(kw in q for kw in [\"客服\", \"排班\", \"客服建议\"]):\n  \
          \      answer = f\"建议10:00-21:00为主力服务时段，13点和20点各增加30%临时客服人力。\"\n    \n \
          \   elif any(kw in q for kw in [\"库存\", \"补货\", \"库存建议\"]):\n        answer\
          \ = \"建议11:00前完成午高峰备货，17:00前完成晚高峰备货。高峰时段前2小时开始输送热销商品。\"\n    \n    # -----\
          \ 12. 综合分析 -----\n    elif any(kw in q for kw in [\"总结\", \"规律\", \"概述\"\
          ]):\n        answer = f\"\"\"订单规律总结：\n- 时段：{peak_hour}点最高（{peak_num:,}单），{low_hour}点最低（{low_num}单）\n\
          - 月份：{peak_month_name}最高（{peak_month_num:,}单），{low_month_name}最低（{low_month_num:,}单）\n\
          - 星期：{peak_weekday_name}最高（{peak_weekday_num:,}单）\n- 季度：Q4最高（{q4_orders:,}单）\n\
          - 平台：APP+微信合计占比{platform_total_pct}%\"\"\"\n    \n    elif any(kw in q for\
          \ kw in [\"分析\", \"解读\"]):\n        answer = f\"2019年全年{total_2019:,}单，日均{round(total_2019/366,\
          \ 0)}单。高峰13点（{peak_num:,}单），低谷4点（{low_num}单）。12-14点占{pct_12_14}%，19-21点占{pct_19_21}%。\"\
          \n    \n    # ----- 13. 默认回答（问题列表）-----\n    else:\n        answer = \"\"\
          \"关于这个问题，我暂时无法回答。我可以帮你解答：\n\n\U0001F4CA **订单数据**：多少年数据、各年份订单量、总订单量\n⏰ **时段分析**：哪个时段订单最多/最少、分布规律、13点比4点多多少\n\
          \U0001F4C5 **月份分析**：哪个月订单最多/最少、月份分布\n\U0001F4C6 **星期分析**：星期几订单最多/最少、周末vs工作日\n\
          \U0001F4C8 **季度分析**：哪个季度订单最多\n\U0001F4E6 **商品分析**：哪个商品卖得最多\n\U0001F4F1 **平台分析**：哪个平台订单最多、APP+微信占比\n\
          \U0001F517 **渠道分析**：哪个渠道订单最多\n\U0001F4B0 **金额分析**：平均订单金额、总营收\n\U0001F465\
          \ **用户分析**：哪个用户下单最多\n\U0001F4A1 **运营建议**：促销、客服排班、库存补货\n\U0001F4CB **总结分析**：总结订单规律、分析2019年数据\n\
          \n\U0001F52E **新增预测功能**：\n- ⏰ 明天20点有多少订单？\n- ⏰ 明天几点订单最多？\n- \U0001F4C8 下个季度订单会增长吗？\n\
          - \U0001F4E6 哪个商品可能成为爆款？\n- \U0001F4F1 哪个平台增长最快？\n- \U0001F4B0 客单价会涨还是跌？\n\
          \n请尝试问我这些问题！\"\"\"\n    \n    return {\n        \"simple_context\": \"\"\
          ,\n        \"answer\": answer,\n        \"matched\": answer is not None\n\
          \    }"
